<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug 测试页</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 600px; margin: 0 auto; }
    h1 { color: #1b3d4d; }
    p { color: #555; line-height: 1.6; }
    code { background: #f0f0f0; padding: 0.2em 0.4em; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Debug 测试页</h1>
  <p>这是 <strong>debug</strong> 文件夹里的最小测试页，用来单独调试、打断点。</p>
  <p>在 Cursor 里按 <code>F5</code> 或左侧「Run and Debug」选「打开 Debug 测试页」即可用 Chrome 打开本页并开始调试。</p>
  <p>打开开发者工具 (F12) → Sources 里可给 JS 设断点；若本页没有自己的 JS，可先在下面加一个 <code>&lt;script&gt;</code> 做试验。</p>
  <script>
    console.log('Debug 页面已加载');
  </script>
</body>
</html>
